<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubShield | Student Hackathon Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="intro"><div class="intro-text">SubShield.</div></div>

    <nav class="navbar">
        <div class="logo">✦ SubShield</div>
        <div class="nav-right">
            <div class="profile-circle" onclick="toggleMenu()">
                <img src="https://i.pravatar.cc/150?u=student" alt="Me">
            </div>
            <div id="dropdown" class="dropdown-content">
                <a href="#">My Journey</a>
                <a href="#" onclick="localStorage.clear(); location.reload();" style="color: #ff5e5e;">Reset All Data</a>
            </div>
        </div>
    </nav>

    <div class="workspace">
        <div class="sticky-note-form">
            <h3>New Registry ✏️</h3>
            <div class="input-group">
                <select id="presetName" onchange="handlePresetChange()">
                    <option value="">Choose Service</option>
                    <option value="Netflix">Netflix</option>
                    <option value="Spotify">Spotify</option>
                    <option value="ChatGPT">ChatGPT Plus</option>
                    <option value="custom"> + Custom</option>
                </select>
                <input type="text" id="customName" placeholder="Name..." style="display:none;">
                <input type="number" id="cost" placeholder="Price ₹">
                <input type="date" id="date">
                <select id="billing">
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
                <select id="category">
                    <option value="Entertainment">Chill 🍿</option>
                    <option value="Productivity">Study 📚</option>
                    <option value="Health">Gym 🏋️</option>
                </select>
                <div class="trial-toggle">
                    <input type="checkbox" id="isTrial"> <label for="isTrial">Free Trial? 🎁</label>
                </div>
                <button onclick="addSubscription()" class="btn-add">Add to Registry ➜</button>
            </div>
        </div>

        <div id="lifestyle-alert">
            Calculating your Vada Pav impact...
        </div>

        <div class="stats-grid">
            <div class="neo-box pink-glow">
                <p>Monthly Burn</p>
                <h2 id="totalVal">₹0.00</h2>
            </div>
            <div class="neo-box cyan-glow">
                <p>10y Wealth Projection</p>
                <h2 id="saveVal">₹0.00</h2>
            </div>
            <div class="neo-box yellow-glow">
                <p>Renewals</p>
                <div id="renewals" class="renewal-scroll">Clear!</div>
            </div>
        </div>

        <div class="visuals-row">
            <div class="chart-wrapper">
                <h4>Spend Mix 🍕</h4>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h4>Usage Check 📈</h4>
                <canvas id="efficiencyChart"></canvas>
            </div>
        </div>

        <h3 class="title-font">Active Registry 📁</h3>
        <div id="list" class="registry-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
